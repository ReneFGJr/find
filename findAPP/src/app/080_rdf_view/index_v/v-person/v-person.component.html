<h4>{{data?.concept?.name}}</h4>
<span class="small">Classe: <strong>{{data?.concept?.Class}}</strong></span>

<div class="mt-3">
  <h5>Propriedades</h5>
  <ul>
    <li *ngFor="let prop of data?.data">
      <i>{{prop.Property}}</i>:
      <a [routerLink]="['/v', prop.ID]" class="link">{{prop.Caption}}</a>
    </li>
  </ul>
