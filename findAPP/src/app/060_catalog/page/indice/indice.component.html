<div class="container my-5">

  <div class="row mb-4">
    <div class="col text-center">
      <h2 class="fw-bold">
        <a [routerLink]="['/indices']" class="link"><i class="bi bi-list-ul me-2"></i> Índices</a>
      </h2>
      <p class="text-muted">
        Navegue pelos diferentes índices do catálogo
      </p>
    </div>
  </div>

  <div class="row g-4" *ngIf="!type">

    <div class="col-md-4 col-lg-3">
      <a [routerLink]="['/indices/title']" class="index-card">
        <i class="bi bi-type"></i>
        <span>Títulos</span>
      </a>
    </div>

    <div class="col-md-4 col-lg-3">
      <a [routerLink]="['/indices/author']" class="index-card">
        <i class="bi bi-person-lines-fill"></i>
        <span>Autores</span>
      </a>
    </div>

    <div class="col-md-4 col-lg-3">
      <a [routerLink]="['/indices/subject']" class="index-card">
        <i class="bi bi-tags-fill"></i>
        <span>Assuntos</span>
      </a>
    </div>

    <div class="col-md-4 col-lg-3">
      <a [routerLink]="['/indices/publisher']" class="index-card">
        <i class="bi bi-building"></i>
        <span>Editoras</span>
      </a>
    </div>

    <div class="col-md-4 col-lg-3">
      <a [routerLink]="['/indices/year']" class="index-card">
        <i class="bi bi-calendar-event"></i>
        <span>Ano</span>
      </a>
    </div>
  </div>
</div>

<!---- Title-->
<app-index-title *ngIf="type === 'title'" [indexData]="data?.data"></app-index-title>
<app-index-subject *ngIf="type === 'subject'" [indexData]="data"></app-index-subject>
<app-index-author *ngIf="type === 'author'" [indexData]="data"></app-index-author>
<app-index-publisher *ngIf="type === 'publisher'" [indexData]="data"></app-index-publisher>
<app-index-year *ngIf="type === 'year'" [indexData]="data"></app-index-year>
